version: "3.9"

networks:
  fax_net:
    driver: bridge

services:
  # Основная база данных
  fax_postgres:
    container_name: fax_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${FAX_PG_DB:-faxmsgr}
      POSTGRES_USER: ${FAX_PG_USER:-faxmsgr}
      POSTGRES_PASSWORD: ${FAX_PG_PASSWORD:?FAX_PG_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FAX_PG_USER:-faxmsgr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Архивная база данных (Закон Яровой)
  fax_postgres_archive:
    container_name: fax_postgres_archive
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${FAX_PG_ARCHIVE_DB:-faxmsgr_archive}
      POSTGRES_USER: ${FAX_PG_ARCHIVE_USER:-faxmsgr_archive}
      POSTGRES_PASSWORD: ${FAX_PG_ARCHIVE_PASSWORD:?FAX_PG_ARCHIVE_PASSWORD is required}
    volumes:
      - postgres_archive_data:/var/lib/postgresql/data
    networks:
      - fax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FAX_PG_ARCHIVE_USER:-faxmsgr_archive}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для сессий, OTP и статусов
  fax_redis:
    container_name: fax_redis
    image: redis:7-alpine
    command: redis-server --requirepass ${FAX_REDIS_PASSWORD:?FAX_REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - fax_net

  # MinIO — S3-совместимое хранилище медиафайлов
  fax_minio:
    container_name: fax_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${FAX_MINIO_USER:?FAX_MINIO_USER is required}
      MINIO_ROOT_PASSWORD: ${FAX_MINIO_PASSWORD:?FAX_MINIO_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - fax_net

  # Go-сервер (изолирован внутри сети — доступен только через fax_client/Nginx)
  fax_server:
    container_name: fax_server
    build: .
    environment:
      FAX_DATABASE_URL: postgres://${FAX_PG_USER:-faxmsgr}:${FAX_PG_PASSWORD}@fax_postgres:5432/${FAX_PG_DB:-faxmsgr}
      FAX_ARCHIVE_DATABASE_URL: postgres://${FAX_PG_ARCHIVE_USER:-faxmsgr_archive}:${FAX_PG_ARCHIVE_PASSWORD}@fax_postgres_archive:5432/${FAX_PG_ARCHIVE_DB:-faxmsgr_archive}
      FAX_REDIS_ADDR: fax_redis:6379
      FAX_REDIS_PASSWORD: ${FAX_REDIS_PASSWORD}
      FAX_JWT_SECRET: ${FAX_JWT_SECRET:?FAX_JWT_SECRET is required}
      FAX_SERVER_ADDR: ${FAX_SERVER_ADDR:-:8080}
      FAX_S3_ENDPOINT: fax_minio:9000
      FAX_S3_ACCESS_KEY: ${FAX_MINIO_USER}
      FAX_S3_SECRET_KEY: ${FAX_MINIO_PASSWORD}
      FAX_S3_BUCKET: ${FAX_S3_BUCKET:-faxmsgr-media}
    networks:
      - fax_net
    depends_on:
      fax_postgres:
        condition: service_healthy
      fax_postgres_archive:
        condition: service_healthy
      fax_redis:
        condition: service_started

  # Веб-клиент (Nginx + React SPA) — единственная точка входа извне
  fax_client:
    container_name: fax_client
    build: ../faxmsgr.client
    ports:
      - "80:80"
    networks:
      - fax_net
    depends_on:
      - fax_server

volumes:
  postgres_data:
  postgres_archive_data:
  redis_data:
  minio_data:
