version: "3.9"

networks:
  fax_net:
    driver: bridge

services:
  # Основная база данных
  fax_postgres:
    container_name: fax_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr
      POSTGRES_USER: faxmsgr
      POSTGRES_PASSWORD: faxmsgr_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Архивная база данных (Закон Яровой)
  fax_postgres_archive:
    container_name: fax_postgres_archive
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr_archive
      POSTGRES_USER: faxmsgr_archive
      POSTGRES_PASSWORD: faxmsgr_archive_secret
    volumes:
      - postgres_archive_data:/var/lib/postgresql/data
    networks:
      - fax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr_archive"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для сессий, OTP и статусов
  fax_redis:
    container_name: fax_redis
    image: redis:7-alpine
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data
    networks:
      - fax_net

  # MinIO — S3-совместимое хранилище медиафайлов
  fax_minio:
    container_name: fax_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    networks:
      - fax_net

  # Go-сервер (изолирован внутри сети — доступен только через fax_client/Nginx)
  fax_server:
    container_name: fax_server
    build: .
    environment:
      FAX_DATABASE_URL: postgres://faxmsgr:faxmsgr_secret@fax_postgres:5432/faxmsgr
      FAX_ARCHIVE_DATABASE_URL: postgres://faxmsgr_archive:faxmsgr_archive_secret@fax_postgres_archive:5432/faxmsgr_archive
      FAX_REDIS_ADDR: fax_redis:6379
      FAX_REDIS_PASSWORD: redis_secret
      FAX_JWT_SECRET: change_me_in_production
      FAX_SERVER_ADDR: :8080
      FAX_S3_ENDPOINT: fax_minio:9000
      FAX_S3_ACCESS_KEY: minio_admin
      FAX_S3_SECRET_KEY: minio_secret
      FAX_S3_BUCKET: faxmsgr-media
    networks:
      - fax_net
    depends_on:
      fax_postgres:
        condition: service_healthy
      fax_postgres_archive:
        condition: service_healthy
      fax_redis:
        condition: service_started

  # Веб-клиент (Nginx + React SPA) — единственная точка входа извне
  fax_client:
    container_name: fax_client
    build: ../faxmsgr.client
    ports:
      - "80:80"
    networks:
      - fax_net
    depends_on:
      - fax_server

volumes:
  postgres_data:
  postgres_archive_data:
  redis_data:
  minio_data:
