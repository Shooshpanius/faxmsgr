version: "3.9"

services:
  # Основная база данных
  fax_postgres:
    container_name: fax_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr
      POSTGRES_USER: faxmsgr
      POSTGRES_PASSWORD: faxmsgr_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Архивная база данных (Закон Яровой)
  fax_postgres_archive:
    container_name: fax_postgres_archive
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr_archive
      POSTGRES_USER: faxmsgr_archive
      POSTGRES_PASSWORD: faxmsgr_archive_secret
    volumes:
      - postgres_archive_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr_archive"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для сессий, OTP и статусов
  fax_redis:
    container_name: fax_redis
    image: redis:7-alpine
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # MinIO — S3-совместимое хранилище медиафайлов
  fax_minio:
    container_name: fax_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Go-сервер
  fax_server:
    container_name: fax_server
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://faxmsgr:faxmsgr_secret@fax_postgres:5432/faxmsgr
      ARCHIVE_DATABASE_URL: postgres://faxmsgr_archive:faxmsgr_archive_secret@fax_postgres_archive:5432/faxmsgr_archive
      REDIS_ADDR: fax_redis:6379
      REDIS_PASSWORD: redis_secret
      JWT_SECRET: change_me_in_production
      SERVER_ADDR: :8080
      S3_ENDPOINT: fax_minio:9000
      S3_ACCESS_KEY: minio_admin
      S3_SECRET_KEY: minio_secret
      S3_BUCKET: faxmsgr-media
    depends_on:
      fax_postgres:
        condition: service_healthy
      fax_postgres_archive:
        condition: service_healthy
      fax_redis:
        condition: service_started

volumes:
  postgres_data:
  postgres_archive_data:
  redis_data:
  minio_data:
