version: "3.9"

services:
  # Основная база данных
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr
      POSTGRES_USER: faxmsgr
      POSTGRES_PASSWORD: faxmsgr_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Архивная база данных (Закон Яровой)
  postgres_archive:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxmsgr_archive
      POSTGRES_USER: faxmsgr_archive
      POSTGRES_PASSWORD: faxmsgr_archive_secret
    volumes:
      - postgres_archive_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faxmsgr_archive"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для сессий, OTP и статусов
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # MinIO — S3-совместимое хранилище медиафайлов
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Go-сервер
  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://faxmsgr:faxmsgr_secret@postgres:5432/faxmsgr
      ARCHIVE_DATABASE_URL: postgres://faxmsgr_archive:faxmsgr_archive_secret@postgres_archive:5432/faxmsgr_archive
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: redis_secret
      JWT_SECRET: change_me_in_production
      SERVER_ADDR: :8080
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minio_admin
      S3_SECRET_KEY: minio_secret
      S3_BUCKET: faxmsgr-media
    depends_on:
      postgres:
        condition: service_healthy
      postgres_archive:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  postgres_archive_data:
  redis_data:
  minio_data:
