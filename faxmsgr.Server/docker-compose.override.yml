# Файл автоматически подхватывается docker-compose при локальной разработке.
# Пробрасывает порты внутренних сервисов на хост для удобства работы с
# DBeaver, redis-cli, MinIO Console и т.д.
# НЕ использовать в production.
version: "3.9"

services:
  fax_postgres:
    ports:
      - "5432:5432"

  fax_postgres_archive:
    ports:
      - "5433:5432"

  fax_redis:
    ports:
      - "6379:6379"

  fax_minio:
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console

  # Прямой доступ к API в обход Nginx — для тестирования через curl/Postman
  fax_server:
    ports:
      - "8080:8080"
