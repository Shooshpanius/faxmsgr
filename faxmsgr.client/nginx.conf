server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-резолвер для динамического разрешения имён upstream-контейнеров
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Проксирование API-запросов к бэкенду
    location /weatherforecast {
        set $backend http://fax_server:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: отдавать index.html для любых путей (HTML5 History API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических ресурсов со fingerprint-ами
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

